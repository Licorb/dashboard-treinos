<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard de Treinos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #F5F3EF; --text: #1A1916; --accent: #3D6B4F; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    #debug-screen { 
      background: #000; color: #0f0; font-family: 'DM Mono', monospace; 
      padding: 15px; font-size: 12px; border-radius: 8px; margin-bottom: 20px;
      max-height: 200px; overflow-y: auto; border: 2px solid #333;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); }
    .val { font-size: 24px; font-weight: 500; }
    .label { font-size: 12px; color: #777; text-transform: uppercase; }
    canvas { background: #fff; border-radius: 12px; padding: 10px; border: 1px solid rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div id="debug-screen">SISTEMA: Aguardando inicialização...</div>

  <div class="grid">
    <div class="card"><div class="label">Último Peso</div><div id="v-peso" class="val">—</div></div>
    <div class="card"><div class="label">Total KM</div><div id="v-dist" class="val">—</div></div>
    <div class="card"><div class="label">Treinos</div><div id="v-count" class="val">—</div></div>
  </div>

  <div style="height: 300px; margin-bottom: 20px;">
    <canvas id="chartPeso"></canvas>
  </div>

<script>
  // Função de log que escreve na tela e no console
  function monitor(msg, color = "#0f0") {
    const screen = document.getElementById('debug-screen');
    console.log(msg);
    screen.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
    screen.scrollTop = screen.scrollHeight;
  }

  async function start() {
    monitor("Passo 1: Script iniciado.");
    
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRECSW_a0hZVBAlWFYcD8CDE8B_zLbdbliNE5hojg-m7Z_1JFe-LWD9CBTcMS5sm59aBZ8Lc797KMva/pub?gid=167949635&single=true&output=csv';

    try {
      monitor("Passo 2: Tentando baixar planilha...");
      const response = await fetch(URL_CSV);
      
      if (!response.ok) throw new Error("Erro ao acessar link da planilha. Status: " + response.status);
      
      const text = await response.text();
      monitor("Passo 3: Planilha baixada. Processando linhas...");

      const rows = text.split(/\r?\n/).map(l => l.split(/[,;]/));
      
      // Achar cabeçalho
      const headerIdx = rows.findIndex(r => r.some(c => c.toLowerCase().includes('dia')));
      if (headerIdx === -1) throw new Error("Não achei a coluna 'dia' na sua planilha.");

      const headers = rows[headerIdx].map(h => h.trim().toLowerCase());
      const data = rows.slice(headerIdx + 1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = row[i] ? row[i].trim() : "");
        return obj;
      }).filter(r => r.dia && r.dia.includes('/'));

      monitor("Passo 4: " + data.length + " linhas de dados encontradas.");

      // Cálculos Simples
      const pesos = data.filter(d => d.peso).map(d => parseFloat(d.peso.replace(',', '.')));
      const dists = data.filter(d => d.distef).map(d => parseFloat(d.distef.replace(',', '.')));
      
      document.getElementById('v-peso').innerText = pesos.length ? pesos[pesos.length-1] + " kg" : "—";
      document.getElementById('v-dist').innerText = dists.reduce((a,b) => a+b, 0).toFixed(1) + " km";
      document.getElementById('v-count').innerText = data.length;

      // Gráfico Básico
      monitor("Passo 5: Desenhando gráfico...");
      new Chart(document.getElementById('chartPeso'), {
        type: 'line',
        data: {
          labels: data.map(d => d.dia),
          datasets: [{
            label: 'Peso',
            data: pesos,
            borderColor: '#3D6B4F',
            tension: 0.2
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      monitor("SUCESSO: Dashboard carregado.", "cyan");

    } catch (err) {
      monitor("ERRO: " + err.message, "red");
      console.error(err);
    }
  }

  // Tenta rodar imediatamente
  start();
</script>
</body>
</html>
