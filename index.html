<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Treinos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root { --bg: #F5F3EF; --surface: #FFFFFF; --border: rgba(0,0,0,0.08); --text: #1A1916; --text-muted: #7A7770; --radius-md: 12px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .status { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; background: #e0e0e0; border-radius: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: var(--surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
    .val { font-size: 28px; font-weight: 500; letter-spacing: -1px; }
    .chart-box { background: var(--surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); margin-bottom: 15px; }
    .chart-title { font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 15px; color: var(--text-muted); }
    #error-msg { display: none; background: #fee; color: #b00; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fcc; font-size: 14px; }
  </style>
</head>
<body>

  <div id="error-msg"></div>

    </div>
    <div id="status" class="status">Sincronizando...</div>
  </header>
