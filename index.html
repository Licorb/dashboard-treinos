<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Treinos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #F5F3EF; --card: #FFFFFF; --text: #1A1916; --muted: #7A7770; --border: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .val { font-size: 24px; font-weight: 500; }
    .chart-container { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; min-height: 250px; }
    #error-log { display: none; background: #fff0f0; color: #c00; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; border: 1px solid #fcc; }
  </style>
</head>
<body>

<div class="container">
  <div id="error-log"></div>
  <header>
    <div>
      <h1 style="font-size: 22px;">Treinos de Corrida</h1>
      <p style="font-size: 13px; color: var(--muted);">Meta: 74,0 kg</p>
    </div>
    <div id="status" style="font-size: 11px; color: var(--muted);">Conectando...</div>
  </header>

  <div class="grid">
    <div class="card"><div class="label">Peso Atual</div><div id="v-peso" class="val">—</div></div>
    <div class="card"><div class="label">Km Total</div><div id="v-dist" class="val">—</div></div>
    <div class="card"><div class="label">Academia</div><div id="v-gym" class="val">—</div></div>
    <div class="card"><div class="label">Sessões</div><div id="v-count" class="val">—</div></div>
  </div>

  <div class="chart-container">
    <div class="label">Volume Semanal (km)</div>
    <div style="height: 200px;"><canvas id="chartSemana"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="label">Evolução do Peso (kg)</div>
    <div style="height: 200px;"><canvas id="chartPeso"></canvas></div>
  </div>
</div>

<script>
