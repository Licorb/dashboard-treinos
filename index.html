<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Treinos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #F5F3EF; --surface: #FFFFFF; --surface2: #EDEAE4; --border: rgba(0,0,0,0.08);
      --text: #1A1916; --text-muted: #7A7770; --text-hint: #B0ADA8; --accent: #3D6B4F;
      --accent-light: #D4E8DC; --blue: #A8C8F0; --purple: #C8B4E8; --green: #B8E0C8;
      --amber: #FAD4A0; --pink: #F4A8B4; --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 4rem; }
    
    header { 
      padding: 2.5rem; display: flex; justify-content: space-between; align-items: flex-end;
      background: var(--surface); border-bottom: 1px solid var(--border); margin-bottom: 2rem;
    }
    .header-left h1 { font-size: 1.6rem; font-weight: 500; }
    .header-left p { font-size: 0.85rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .last-update { 
      background: var(--accent-light); color: var(--accent); font-size: 0.72rem; 
      padding: 4px 12px; border-radius: 20px; font-family: 'DM Mono', monospace;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    
    .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 2rem; }
    .card { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 1.2rem; position: relative; }
    .card-label { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--text-hint); text-transform: uppercase; margin-bottom: 8px; }
    .card-value { font-size: 1.8rem; font-weight: 400; letter-spacing: -0.03em; }
    .card-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }
    .card-accent { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 12px 12px; }

    .charts-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; margin-bottom: 1.4rem; }
    .chart-card { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 1.5rem; }
    .chart-title { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--text-hint); text-transform: uppercase; margin-bottom: 15px; }

    @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr 1fr; } .charts-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Treinos de Corrida</h1>
    <p>jan 2026 → presente</p>
  </div>
  <div class="header-right">
    <div class="last-update" id="status">Sincronizando...</div>
  </div>
</header>

<div class="container">
  <div class="cards-grid">
    <div class="card">
      <div class="card-label">Último Peso</div>
      <div class="card-value" id="v-peso">—</div>
      <div class="card-sub">meta: 74.0 kg</div>
      <div class="card-accent" style="background: var(--purple)"></div>
    </div>
    <div class="card">
      <div class="card-label">Distância Total</div>
      <div class="card-value" id="v-dist">—</div>
      <div class="card-sub" id="v-count">0 treinos</div>
      <div class="card-accent" style="background: var(--blue)"></div>
    </div>
    <div class="card">
      <div class="card-label">Academia</div>
      <div class="card-value" id="v-gym">—</div>
      <div class="card-sub">sessões extras</div>
      <div class="card-accent" style="background: var(--green)"></div>
    </div>
    <div class="card">
      <div class="card-label">Provas</div>
      <div class="card-value" id="v-provas">—</div>
      <div class="card-sub">corridas oficiais</div>
      <div class="card-accent" style="background: var(--pink)"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Volume por Semana (km)</div>
      <div style="height: 250px;"><canvas id="chartSemana"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Tipos de Treino</div>
      <div style="height: 250px;"><canvas id="chartTipos"></canvas></div>
    </div>
  </div>

  <div class="chart-card" style="margin-top: 14px;">
    <div class="chart-title">Evolução do Peso (kg)</div>
    <div style="height: 200px;"><canvas id="chartPeso"></canvas></div>
  </div>
</div>

<script>
  const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRECSW_a0hZVBAlWFYcD8CDE8B_zLbdbliNE5hojg-m7Z_1JFe-LWD9CBTcMS5sm59aBZ8Lc797KMva/pub?gid=167949635&single=true&output=csv';

  // Limpa strings como "78,50 KG" ou "5.00 K" transformando em números reais
  function limparNum(val) {
    if (!val) return 0;
    let limpo = val.toString().replace('KG','').replace('K','').replace(',','.').trim();
    return parseFloat(limpo) || 0;
  }

  // Descobre qual domingo pertence aquela data para agrupar por semana
  function getSemana(dateStr) {
    let [d, m] = dateStr.split('/').map(Number);
    let date = new Date(2026, m - 1, d);
    date.setDate(date.getDate() - date.getDay());
    return date.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
  }

  async function carregarDashboard() {
    try {
      const res = await fetch(URL_CSV);
      const text = await res.text();
      
      // Converte CSV para Objetos
      const rows = text.split(/\r?\n/).map(l => l.split(/[,;]/));
      const headers = rows[0].map(h => h.trim().toLowerCase());
      
      const data = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = row[i] ? row[i].trim() : "");
        return obj;
      }).filter(r => r.dia && r.dia.includes('/')); // FILTRO: Só aceita se tiver data válida

      // --- PROCESSAMENTO ---
      const ultPeso = data.filter(d => limparNum(d.peso) > 0).pop();
      const totalKm = data.reduce((sum, r) => sum + limparNum(r.distef), 0);
      const academia = data.filter(r => r.comp && r.comp.toLowerCase().includes('academia')).length;
      const provas = data.filter(r => r.tipo && r.tipo.toLowerCase().includes('prova')).length;

      // --- ATUALIZAR UI ---
      document.getElementById('v-peso').innerText = ultPeso ? limparNum(ultPeso.peso).toFixed(1) + ' kg' : '—';
      document.getElementById('v-dist').innerText = totalKm.toFixed(1) + ' km';
      document.getElementById('v-count').innerText = data.length + ' treinos registrados';
      document.getElementById('v-gym').innerText = academia + 'x';
      document.getElementById('v-provas').innerText = provas;
      document.getElementById('status').innerText = 'Atualizado agora';

      // --- GRÁFICOS ---
      
      // 1. Gráfico de Peso
      const dadosPeso = data.filter(d => limparNum(d.peso) > 0);
      new Chart(document.getElementById('chartPeso'), {
        type: 'line',
        data: {
          labels: dadosPeso.map(d => d.dia),
          datasets: [{ data: dadosPeso.map(d => limparNum(d.peso)), borderColor: '#C8B4E8', tension: 0.3, fill: false }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      // 2. Gráfico de Semanas
      const semMap = {};
      data.forEach(r => {
        let s = getSemana(r.dia);
        semMap[s] = (semMap[s] || 0) + limparNum(r.distef);
      });
      new Chart(document.getElementById('chartSemana'), {
        type: 'bar',
        data: {
          labels: Object.keys(semMap),
          datasets: [{ data: Object.values(semMap), backgroundColor: '#A8C8F0', borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      // 3. Tipos de Treino
      const tiposMap = {};
      data.forEach(r => { if(r.distef && r.tipo) tiposMap[r.tipo] = (tiposMap[r.tipo] || 0) + 1; });
      new Chart(document.getElementById('chartTipos'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(tiposMap),
          datasets: [{ data: Object.values(tiposMap), backgroundColor: ['#A8C8F0','#B8E0C8','#C8B4E8','#FAD4A0','#F4A8B4'] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

    } catch (e) {
      document.getElementById('status').innerText = 'Erro ao carregar';
      console.error(e);
    }
  }

  carregarDashboard();
</script>

</body>
</html>
