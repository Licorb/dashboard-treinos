<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Treinos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #F5F3EF; --surface: #FFFFFF; --border: rgba(0,0,0,0.08);
      --text: #1A1916; --text-muted: #7A7770; --accent: #3D6B4F;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .status { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; background: #e0e0e0; border-radius: 20px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: var(--surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
    .val { font-size: 28px; font-weight: 500; letter-spacing: -1px; }

    .chart-box { background: var(--surface); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); margin-bottom: 15px; }
    .chart-title { font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 15px; color: var(--text-muted); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="font-size: 20px; font-weight: 500;">Treinos de Corrida</h1>
      <p style="font-size: 12px; color: var(--text-muted);">Objetivo: 74,0 kg</p>
    </div>
    <div id="status" class="status">Sincronizando...</div>
  </header>

  <div class="grid">
    <div class="card"><div class="label">Último Peso</div><div id="v-peso" class="val">—</div></div>
    <div class="card"><div class="label">Distância Total</div><div id="v-dist" class="val">—</div></div>
    <div class="card"><div class="label">Academia</div><div id="v-gym" class="val">—</div></div>
    <div class="card"><div class="label">Treinos</div><div id="v-count" class="val">—</div></div>
  </div>

  <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px;">
    <div class="chart-box">
      <div class="chart-title">Volume por Semana (km)</div>
      <div style="height: 250px;"><canvas id="chartSemana"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Tipos de Treino</div>
      <div style="height: 250px;"><canvas id="chartTipos"></canvas></div>
    </div>
  </div>

  <div class="chart-box">
    <div class="chart-title">Evolução do Peso (kg)</div>
    <div style="height: 200px;"><canvas id="chartPeso"></canvas></div>
  </div>
</div>

<script>
  const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRECSW_a0hZVBAlWFYcD8CDE8B_zLbdbliNE5hojg-m7Z_1JFe-LWD9CBTcMS5sm59aBZ8Lc797KMva/pub?gid=167949635&single=true&output=csv';

  // Função para limpar números com vírgula (ex: "5,50 K" -> 5.5)
  function parseBr(val) {
    if (!val) return 0;
    let s = val.toString().replace(/[^0-9,.-]/g, '').replace(',', '.');
    return parseFloat(s) || 0;
  }

  // Converte data DD/MM para objeto Date para ordenação correta
  function toDate(str) {
    const [d, m] = str.split('/').map(Number);
    return new Date(2026, m - 1, d);
  }

  async function init() {
    try {
      const res = await fetch(URL_CSV);
      const text = await res.text();
      
      // DIVISÃO INTELIGENTE: Tenta ponto-e-vírgula primeiro, depois vírgula
      const lines = text.split(/\r?\n/);
      const delimiter = lines[0].includes(';') ? ';' : ',';
      const rows = lines.map(l => l.split(delimiter).map(c => c.replace(/"/g, '').trim()));

      // Localiza os índices das colunas pelo nome (robusto)
      const headers = rows[0].map(h => h.toLowerCase());
      const idx = {
        dia: headers.indexOf('dia'),
        dist: headers.indexOf('distef'),
        tipo: headers.indexOf('tipo'),
        comp: headers.indexOf('comp'),
        peso: headers.indexOf('peso')
      };

      // Filtra apenas linhas com data válida e ignora o cabeçalho
      const rawData = rows.slice(1)
        .filter(r => r[idx.dia] && r[idx.dia].includes('/'))
        .map(r => ({
          dia: r[idx.dia],
          dist: parseBr(r[idx.dist]),
          tipo: r[idx.tipo] || 'Livre',
          comp: r[idx.comp] || '',
          peso: parseBr(r[idx.peso]),
          timestamp: toDate(r[idx.dia])
        }))
        .sort((a, b) => a.timestamp - b.timestamp);

      // --- CÁLCULOS ---
      const dadosPeso = rawData.filter(d => d.peso > 40 && d.peso < 150); // Filtra outliers (como o erro de 200)
      const ultPeso = dadosPeso.length ? dadosPeso[dadosPeso.length-1].peso : 0;
      const totalKm = rawData.reduce((acc, cur) => acc + cur.dist, 0);
      const academia = rawData.filter(r => r.comp.toLowerCase().includes('academia')).length;

      // --- UI ---
      document.getElementById('v-peso').innerText = ultPeso ? ultPeso.toFixed(1) + ' kg' : '—';
      document.getElementById('v-dist').innerText = totalKm.toFixed(1) + ' km';
      document.getElementById('v-gym').innerText = academia + 'x';
      document.getElementById('v-count').innerText = rawData.length;
      document.getElementById('status').innerText = 'Sincronizado';

      // --- GRÁFICOS ---
      
      // 1. Gráfico de Peso
      new Chart(document.
