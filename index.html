<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Treinos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #F5F3EF; --card: #FFFFFF; --text: #1A1916; --muted: #7A7770; --border: rgba(0,0,0,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
    .label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .val { font-size: 24px; font-weight: 500; }
    .chart-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; margin-bottom: 15px; }
    .chart-container { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); min-height: 300px; }
    @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="font-size: 22px;">Treinos de Corrida</h1>
      <p style="font-size: 13px; color: var(--muted);">Meta: 74,0 kg</p>
    </div>
    <div id="status" style="font-size: 11px; color: var(--muted);">Sincronizando...</div>
  </header>

  <div class="grid">
    <div class="card"><div class="label">Último Peso</div><div id="v-peso" class="val">—</div></div>
    <div class="card"><div class="label">Distância Total</div><div id="v-dist" class="val">—</div></div>
    <div class="card"><div class="label">Academia</div><div id="v-gym" class="val">—</div></div>
    <div class="card"><div class="label">Total Treinos</div><div id="v-count" class="val">—</div></div>
  </div>

  <div class="chart-grid">
    <div class="chart-container">
      <div class="label">Volume Semanal (km)</div>
      <div style="height: 250px;"><canvas id="chartSemana"></canvas></div>
    </div>
    <div class="chart-container">
      <div class="label">Tipos de Treino</div>
      <div style="height: 250px;"><canvas id="chartTipos"></canvas></div>
    </div>
  </div>

  <div class="chart-container">
    <div class="label">Evolução do Peso (kg)</div>
    <div style="height: 200px;"><canvas id="chartPeso"></canvas></div>
  </div>
</div>

<script>
  const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRECSW_a0hZVBAlWFYcD8CDE8B_zLbdbliNE5hojg-m7Z_1JFe-LWD9CBTcMS5sm59aBZ8Lc797KMva/pub?gid=167949635&single=true&output=csv';

  // O "LIMPADOR ATÔMICO"
  function parseBrNum(val) {
    if (!val) return 0;
    let clean = val.toString().replace(/[a-zA-Z\s]/g, ''); // Remove letras e espaços
    if (clean.includes('.') && clean.includes(',')) {
        clean = clean.replace(/\./g, ''); // Remove ponto de milhar (ex: 1.438,0 -> 1438,0)
    }
    clean = clean.replace(',', '.'); // Troca vírgula decimal por ponto
    
    let n = parseFloat(clean);
    // Validação extra: se o peso vier como 7600 (sem vírgula na planilha), divide por 100
    if (n > 500) n = n / 100; 
    return n || 0;
  }

  async function init() {
    try {
      const res = await fetch(URL);
      const csv = await res.text();
      const lines = csv.split(/\r?\n/);
      const sep = csv.includes(';') ? ';' : ',';
      
      const rawRows = lines.map(l => l.split(sep).map(c => c.replace(/"/g, '').trim()));
      const head = rawRows.find(r => r.some(c => c.toLowerCase().includes('dia')));
      
      const idx = {
        dia: head.findIndex(c => c.toLowerCase() === 'dia'),
        dist: head.findIndex(c => c.toLowerCase().includes('distef')),
        tipo: head.findIndex(c => c.toLowerCase() === 'tipo'),
        peso: head.findIndex(c => c.toLowerCase() === 'peso'),
        comp: head.findIndex(c => c.toLowerCase().includes('comp'))
      };

      const data = rawRows.slice(rawRows.indexOf(head) + 1)
        .filter(r => r[idx.dia] && r[idx.dia].includes('/'))
        .map(r => ({
          dia: r[idx.dia],
          dist: parseBrNum(r[idx.dist]),
          tipo: r[idx.tipo] || 'Outros',
          peso: parseBrNum(r[idx.peso]),
          isGym: (r[idx.comp] || '').toLowerCase().includes('academia')
        }));

      // --- DADOS DOS CARDS ---
      const pesosValidos = data.filter(d => d.peso > 50 && d.peso < 120);
      const lastW = pesosValidos.length ? pesosValidos[pesosValidos.length-1].peso : 0;
      
      document.getElementById('v-peso').innerText = lastW ? lastW.toFixed(1) + ' kg' : '—';
      document.getElementById('v-dist').innerText = data.reduce((s, a) => s + a.dist, 0).toFixed(1) + ' km';
      document.getElementById('v-gym').innerText = data.filter(d => d.isGym).length + 'x';
      document.getElementById('v-count').innerText = data.length;
      document.getElementById('status').innerText = 'Sincronizado';

      // --- GRÁFICO PESO ---
      new Chart(document.getElementById('chartPeso'), {
        type: 'line',
        data: {
          labels: pesosValidos.map(d => d.dia),
          datasets: [{ data: pesosValidos.map(d => d.peso), borderColor: '#9b87f5', tension: 0.3, pointRadius: 2 }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 70, max: 82 } } }
      });

      // --- GRÁFICO TIPOS (PIZZA) ---
      const tiposFreq = {};
      data.forEach(d => { if(d.dist > 0) tiposFreq[d.tipo] = (tiposFreq[d.tipo] || 0) + 1; });
      new Chart(document.getElementById('chartTipos'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(tiposFreq),
          datasets: [{ data: Object.values(tiposFreq), backgroundColor: ['#7EBF8E','#A8C8F0','#C8B4E8','#FAD4A0','#E8A8A8'] }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
      });

      // --- GRÁFICO SEMANAL ---
      const semanas = {};
      data.forEach(d => {
        let [dia, mes] = d.dia.split('/').map(Number);
        let dt = new Date(2026, mes-1, dia);
        dt.setDate(dt.getDate() - dt.getDay());
        let k = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
        semanas[k] = (semanas[k] || 0) + d.dist;
      });
      new Chart(document.getElementById('chartSemana'), {
        type: 'bar',
        data: {
          labels: Object.keys(semanas),
          datasets: [{ data: Object.values(semanas), backgroundColor: '#7EBF8E', borderRadius: 4 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

    } catch (e) { document.getElementById('status').innerText = '
